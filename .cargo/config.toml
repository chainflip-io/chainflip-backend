[env]
CF_ETH_CONTRACT_ABI_ROOT = { value = "contract-interfaces/eth-contract-abis", relative = true }
CF_ETH_CONTRACT_ABI_TAG = "v1.4.1"
CF_SOL_PROGRAM_IDL_ROOT = { value = "contract-interfaces/sol-program-idls", relative = true }
CF_SOL_PROGRAM_IDL_TAG = "v1.3.0"
CF_ARB_CONTRACT_ABI_ROOT = { value = "contract-interfaces/arb-contract-abis", relative = true }
CF_TEST_CONFIG_ROOT = { value = "engine/config/testing", relative = true }
# Required by some compilers to allow zeromq to use old cmake version.
CMAKE_POLICY_VERSION_MINIMUM = "3.5"

# Note: If you just want to save typing command commands, you can install tab completions for most shells. Type
# `rustup completions --help` to find out how to set this up.

[alias]
cf-test = "test --features runtime-benchmarks,try-runtime"
cf-test-ci = "test --release --features runtime-benchmarks,slow-tests,try-runtime"
cf-test-ci-nextest = "nextest run --release --features runtime-benchmarks,slow-tests,try-runtime"
cf-test-cfe = "test --package chainflip-engine --package multisig"

cf-clippy = "clippy --all-targets --features runtime-benchmarks,try-runtime,runtime-integration-tests,slow-tests -- -D warnings -A deprecated -W clippy::allow_attributes"
cf-clippy-ci = "clippy --all-targets --features runtime-benchmarks,try-runtime,runtime-integration-tests,slow-tests -- -D warnings -A deprecated -W clippy::allow_attributes"

cf-build-benchmarks = "build --release --features=runtime-benchmarks"
cf-build-try-runtime = "build --release --features try-runtime"
cf-build-release = "build --release"
cf-build-release-turbo = "build --release --features turbo"
cf-build-production = "build --profile=production"
# Check for feature inconsistencies.
check-sc-features = '''
tree --no-default-features --depth 1 --edges=features,normal
	-p state-chain-*
	-p pallet-cf-*
	-p cf-*
'''

# Requires `cargo-audit`. Run `cargo install cargo-audit` to install it.
# The `cf-audit` command is configured to ignore the following advisories:
#
# - RUSTSEC-2020-0168: This advisory comes from `mach`, which is unmaintained but not a security issue. It's a dependency of `subxt`.
# - RUSTSEC-2022-0061: This advisory is related to the deprecated `parity-wasm`, not a security issue. It's a dependency of `substrate`.
# - RUSTSEC-2023-0091: Low severity, difficult to exploit of wasmtime, dependency of substrate.
# - RUSTSEC-2024-0320: Unmaintained transitive `yaml-rust` dependency of `insta` crate. We only use insta for testing.
# - RUSTSEC-2024-0344: curve25519-dalek is a transitive dependency of `substrate`
# - RUSTSEC-2024-0370: Unmaintained transitive dependency. Only affects macro generation efficiency.
# - RUSTSEC-2024-0384: Unmaintained transitive dependency `instant` used by substrate.
# - RUSTSEC-2024-0388: Unmaintained transitive dependency `derivative` used by substrate.
# - RUSTSEC-2024-0436: Paste is no longer maintained. This is a pre-processor macro, so not an immediate security concern.
# - RUSTSEC-2024-0438: Wasmtime security issue for Windows devices, so not applicable. Dependency of substrate.
# - RUSTSEC-2024-0442: Wasmtime jit debugger issue.
# - RUSTSEC-2025-0009: Transitive dependency use by rustls 0.20.9, as per the advisory, TLS is unaffected.
# - RUSTSEC-2025-0010: Transitive dependency use by rustls 0.20.9, as per the advisory, TLS is unaffected.
# - RUSTSEC-2025-0055: logging injection vulnerability, requires display of arbitrary user input. Fixing this causes color sequence to be escaped and displayed in logs.
# - RUSTSEC-2025-0057: fxhash is unmaintained, but we can't remove it because it's used in substrate.
# - RUSTSEC-2025-0118: Unsound API access to a WebAssembly shared linear memory.
# - RUSTSEC-2025-0134: Unmaintained rustls-pemfile crate (version 1.0.4 and 2.2.0). Substrate dependency.
# - RUSTSEC-2025-0141: Unmaintained bincode crate. Wasmtime dependency.
# - RUSTSEC-2025-0161: Unmaintained libsecp256k1 crate. Substrate dependency.
# - RUSTSEC-2026-0002: Unsoundness in the lru crate. Our immediate dependency is patched, but not the transitive dependency, which is limited to libp2p-identify and smoldot crates.
# - RUSTSEC-2026-0006: Impact is unlikely and upgrading requires polkadot-sdk bump.
# - RUSTSEC-2026-0009: Medium severity, but only exploitable if user-provided strings are parsed into a time format by the `time` dependency.
# - RUSTSEC-2026-0020: Wasmtime memory leak, we don't have any control over the wasmtime version.
# - RUSTSEC-2026-0021: Wasmtime panic, we don't have any control over the wasmtime version.
# - RUSTSEC-2026-0049: Transitive dependency and "an attacker would need to compromise a trusted issuing authority to trigger this bug". It's a dependency of `rustls`.
# - RUSTSEC-2026-0085: Wasmtime panic when lifting `flags` component value. Dependency of substrate.
# - RUSTSEC-2026-0086: Wasmtime host data leakage with 64-bit tables and Winch. Dependency of substrate.
# - RUSTSEC-2026-0087: Wasmtime segfault with `f64x2.splat` on Cranelift x86-64. Dependency of substrate.
# - RUSTSEC-2026-0088: Wasmtime data leakage between pooling allocator instances. Dependency of substrate.
# - RUSTSEC-2026-0089: Wasmtime host panic when Winch executes `table.fill`. Dependency of substrate.
# - RUSTSEC-2026-0091: Wasmtime OOB write or crash when transcoding component model strings. Dependency of substrate.
# - RUSTSEC-2026-0092: Wasmtime panic when transcoding misaligned component model UTF-16 strings. Dependency of substrate.
# - RUSTSEC-2026-0093: Wasmtime heap OOB read in component model UTF-16 to latin1+utf16 transcoding. Dependency of substrate.
# - RUSTSEC-2026-0094: Wasmtime improperly masked return value from `table.grow` with Winch. Dependency of substrate.
# - RUSTSEC-2026-0095: Wasmtime with Winch may allow sandbox-escaping memory access. Dependency of substrate.
# - RUSTSEC-2026-0096: Wasmtime miscompiled guest heap access enables sandbox escape on aarch64 Cranelift. Dependency of substrate.
# - RUSTSEC-2026-0097: Rng issue in the rand 0.8.5 crate. Transitive dependency. Unlikely and low impact.
# - RUSTSEC-2026-0098: rustl-webpki issue, transitive and unrelated to us. Requires issuance of invalid certificates.
# - RUSTSEC-2026-0099: rustl-webpki issue, transitive and unrelated to us. Requires issuance of invalid certificates.
# - RUSTSEC-2026-0104: rustl-webpki issue, transitive and unrelated to us. Requires issuance of invalid certificates.
# - RUSTSEC-2026-0105: core2 unmaintained/yanked. Transitive dependency of `cid` used by substrate's `sc-network`.
# - RUSTSEC-2026-0114: wasmtime panic during memory allocation. Dependency of substrate.
# - RUSTSEC-2026-0118: DoS vector in hickory-proto which is used by libp2p. Dependency of substrate, related to DNS resolution. Low risk.
# - RUSTSEC-2026-0119: DoS vector in hickory-proto which is used by libp2p. Dependency of substrate, related to DNS resolution. Low risk.

#
cf-audit = '''
audit -D unmaintained -D unsound
	--ignore RUSTSEC-2020-0168
	--ignore RUSTSEC-2022-0061
	--ignore RUSTSEC-2023-0091
	--ignore RUSTSEC-2024-0320
	--ignore RUSTSEC-2024-0344
	--ignore RUSTSEC-2024-0370
	--ignore RUSTSEC-2024-0384
	--ignore RUSTSEC-2024-0388
	--ignore RUSTSEC-2024-0436
	--ignore RUSTSEC-2024-0438
	--ignore RUSTSEC-2024-0442
	--ignore RUSTSEC-2025-0009
	--ignore RUSTSEC-2025-0010
	--ignore RUSTSEC-2025-0055
	--ignore RUSTSEC-2025-0057
	--ignore RUSTSEC-2025-0118
	--ignore RUSTSEC-2025-0134
	--ignore RUSTSEC-2025-0141
	--ignore RUSTSEC-2025-0161
	--ignore RUSTSEC-2026-0002
	--ignore RUSTSEC-2026-0006
	--ignore RUSTSEC-2026-0009
	--ignore RUSTSEC-2026-0020
	--ignore RUSTSEC-2026-0021
	--ignore RUSTSEC-2026-0049
	--ignore RUSTSEC-2026-0085
	--ignore RUSTSEC-2026-0086
	--ignore RUSTSEC-2026-0087
	--ignore RUSTSEC-2026-0088
	--ignore RUSTSEC-2026-0089
	--ignore RUSTSEC-2026-0091
	--ignore RUSTSEC-2026-0092
	--ignore RUSTSEC-2026-0093
	--ignore RUSTSEC-2026-0094
	--ignore RUSTSEC-2026-0095
	--ignore RUSTSEC-2026-0096
	--ignore RUSTSEC-2026-0097
	--ignore RUSTSEC-2026-0098
	--ignore RUSTSEC-2026-0099
	--ignore RUSTSEC-2026-0104
	--ignore RUSTSEC-2026-0105
	--ignore RUSTSEC-2026-0114
	--ignore RUSTSEC-2026-0118
	--ignore RUSTSEC-2026-0119
'''

[build]
rustflags = ["--cfg", "tokio_unstable"]
