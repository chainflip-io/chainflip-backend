[package]
name = "scale-json-logger"
version = "0.1.0"
edition = "2021"

[dependencies]
env_logger = "0.11.3"
jsonrpsee = { version = "0.16.2", features = ["macros"] }
scale-info = "2.10"
log = "0.4.16"
subxt = { version = "0.33", features = ["substrate-compat"] }
tokio = { version = "1.22", features = ["full"] }
scale-json = { path = "../../scale-json" }
hex = "0.4"
hex-literal = "0.4"
anyhow = "1.0"
