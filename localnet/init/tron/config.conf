# Witness private key is passed via -p flag in docker-compose to avoid storing it in config.
# It corresponds to keys/bashful/eth_private_key_file.
localwitness = []

block = {
  needSyncCheck = false
  maintenanceTimeInterval = 5000
  proposalExpireTime = 300000
}

