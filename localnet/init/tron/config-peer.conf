storage {
  db.engine = "LEVELDB",
  db.sync = false,
  db.directory = "database",
  transHistory.switch = "on"
}

node.discovery = {
  enable = true
}

node.p2p.version = 11111 # use mainnet p2p version so TVM uses 0x41 address prefix for CREATE2

node {
  # Fixed external IP avoids a NPE when libp2p fails to auto-detect the IP
  # (which happens in an isolated docker network with no internet access).
  externalIp = "127.0.0.1"

  # Connect to the main witness node on its p2p port.
  active = [
    "tron:18888"
  ]

  listen.port = 18889

  http {
    fullNodeEnable = true
    fullNodePort = 8090
    solidityEnable = false
  }

  rpc {
    port = 50051
  }

  jsonrpc {
    httpFullNodeEnable = true
    httpFullNodePort = 8555
    httpSolidityEnable = false
  }

  maxTransactionPendingSize = 2000
}

# Required for triggerConstantContract (read-only contract calls).
# Without this the node returns "this node don't support constant".
vm = {
  supportConstant = true
  estimateEnergy = true
}

